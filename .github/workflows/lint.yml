name: Quality Control

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Trick: We need to use package.template.json dependencies to lint the source code
      # because root package.json is empty for the installer.
      - name: Prepare Template Dependencies
        run: |
          cp package.template.json package.json
          bun install
          bunx prettier --write package.json

      - name: Run Linting
        run: bun lint

      - name: Run Typecheck
        run: bun typecheck

      - name: Check Formatting
        run: bun format:check
